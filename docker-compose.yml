services:
  doubles-app:
    build: .
    container_name: doubles-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: ${PORT:-3000}
      SESSION_SECRET: ${SESSION_SECRET:-change-me}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PIN: ${ADMIN_PIN:-1234}
      USER_USERNAME: ${USER_USERNAME:-user}
      USER_PIN: ${USER_PIN:-1111}
      DATA_DIR: /app/data
      BASE_PATH: ${BASE_PATH:-/doubles}
    volumes:
      - ./data:/app/data
