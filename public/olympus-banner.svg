<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 650" role="img" aria-labelledby="title desc">
  <title id="title">Olympus Disc Golf Course banner</title>
  <desc id="desc">Red, black, and white Olympus-themed banner placeholder with temple iconography.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c02831"/>
      <stop offset="100%" stop-color="#961b22"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1600" height="650" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <polygon points="800,70 980,160 620,160" fill="#111"/>
    <polygon points="800,100 930,155 670,155" fill="#fbf7f2"/>
    <rect x="660" y="160" width="280" height="18" rx="4" fill="#111"/>
    <g fill="#fbf7f2">
      <rect x="695" y="178" width="28" height="130" rx="6"/>
      <rect x="745" y="178" width="28" height="130" rx="6"/>
      <rect x="795" y="178" width="28" height="130" rx="6"/>
      <rect x="845" y="178" width="28" height="130" rx="6"/>
      <rect x="895" y="178" width="28" height="130" rx="6"/>
    </g>
    <rect x="640" y="316" width="320" height="20" rx="4" fill="#fbf7f2"/>
    <rect x="600" y="340" width="400" height="24" rx="4" fill="#fbf7f2"/>
    <rect x="560" y="370" width="480" height="28" rx="4" fill="#fbf7f2"/>
    <rect x="520" y="404" width="560" height="32" rx="4" fill="#fbf7f2"/>
  </g>
  <g font-family="Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif" text-anchor="middle">
    <text x="800" y="555" font-size="220" fill="#111" stroke="#111" stroke-width="28" paint-order="stroke fill">OLYMPUS</text>
    <text x="800" y="555" font-size="220" fill="#fbf7f2">OLYMPUS</text>
    <text x="800" y="615" font-size="52" letter-spacing="10" fill="#fbf7f2">DISC GOLF COURSE</text>
  </g>
</svg>
